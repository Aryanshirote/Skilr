<!DOCTYPE html>
<html>

<head>

<title>Skill Gap Analysis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Poppins, sans-serif;
}

.analysis-container{
max-width:900px;
margin:auto;
margin-top:60px;
}

.analysis-card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.skill-good{
background:#dcfce7;
color:#166534;
padding:8px 14px;
border-radius:20px;
margin:5px;
display:inline-block;
}

.skill-missing{
background:#fee2e2;
color:#991b1b;
padding:8px 14px;
border-radius:20px;
margin:5px;
display:inline-block;
}

</style>

</head>


<body>


<div class="analysis-container">

<h1 class="text-center mb-5">Skill Gap Analysis</h1>


<div class="analysis-card">

<h4>Your Skills</h4>

{% for skill in resume_skills %}

<span class="skill-good">
{{skill}}
</span>

{% endfor %}

</div>


<div class="analysis-card">

<h4>Recommended Skills To Learn</h4>

<p class="text-muted mb-3">
Improving these skills will increase your chances of getting shortlisted.
</p>

{% for skill in missing %}

<span class="skill-missing">
{{skill}}
</span>

{% endfor %}

</div>


</div>

</body>

</html>
